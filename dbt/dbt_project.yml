name: 'healthcare_dw'
version: '1.0.0'
config-version: 2

profile: 'healthcare_dw'

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  healthcare_dw:
    staging:
      +schema: staging
      +materialized: view
      +tags: ["staging"]
    intermediate:
      +schema: intermediate
      +materialized: ephemeral
    marts:
      +schema: gold
      +materialized: table
      +tags: ["gold", "production"]
      claims:
        +post-hook: "GRANT SELECT ON {{ this }} TO ROLE ANALYTICS_ROLE"

vars:
  start_date: '2023-01-01'
